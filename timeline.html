<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Climate Reality Leaders — 2006 to 2025</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root {
    /* Sequential green ramp -- single source of truth */
    --p-darkest: #10502F;
    --p-deep:    #457428;
    --p-mid:     #8DC63F;
    --p-bright:  #C0D110;
    --p-pale:    #D4DF9B;
    --p-gray:    #E6E6E6;

    --font-sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Menlo", "Consolas", "Liberation Mono", monospace;
  }

  /* Light theme (default). Pale cream bg; data runs light -> dark. */
  :root, body.light {
    --bg:           #F4F5EC;
    --bg-tint:      rgba(16, 80, 47, 0.04);
    --land:         var(--p-pale);
    --land-stroke: #B5C47A;
    --graticule:    rgba(16, 80, 47, 0.08);
    --origin:       var(--p-bright);
    --arc:          var(--p-mid);
    --arc-glow:     rgba(141, 198, 63, 0.35);
    --dest:         var(--p-deep);
    --ink:          var(--p-darkest);
    --ink-soft:     rgba(16, 80, 47, 0.55);
    --ink-faint:    rgba(16, 80, 47, 0.18);
    --hud-bg:       rgba(244, 245, 236, 0.78);
    --hud-border:   rgba(16, 80, 47, 0.16);
    --year-blend:   normal;
    --pulse:        var(--p-bright);
    --org-branch:  #FFC500;
    --org-local:   #FFC500;
  }

  /* Dark theme. Deep forest bg; data runs dark -> light. */
  body.dark {
    --bg:           var(--p-darkest);
    --bg-tint:      rgba(255, 255, 255, 0.02);
    --land:         var(--p-deep);
    --land-stroke: #56892F;
    --graticule:    rgba(255, 255, 255, 0.05);
    --origin:       var(--p-mid);
    --arc:          var(--p-bright);
    --arc-glow:     rgba(192, 209, 16, 0.35);
    --dest:         var(--p-pale);
    --ink:          var(--p-gray);
    --ink-soft:     rgba(230, 230, 230, 0.6);
    --ink-faint:    rgba(230, 230, 230, 0.18);
    --hud-bg:       rgba(16, 80, 47, 0.55);
    --hud-border:   rgba(212, 223, 155, 0.18);
    --year-blend:   screen;
    --pulse:        var(--p-mid);
    --org-branch:  #FFC500;
    --org-local:   #FFC500;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 240ms ease, color 240ms ease;
  }

  :root { --banner-h: 48px; }
  #app {
    position: fixed;
    inset: var(--banner-h) 0 0 0;   /* sit below the top banner */
    overflow: hidden;
  }

  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ---------- Map layers ---------- */
  .l-graticule path {
    fill: none;
    stroke: var(--graticule);
    stroke-width: 0.6;
  }
  .l-land path {
    fill: var(--land);
    stroke: var(--land-stroke);
    stroke-width: 0.5;
    stroke-linejoin: round;
    transition: filter 600ms ease;
  }
  .l-land path.has-leaders {
    fill: var(--land);
    filter: brightness(1.08);
  }

  .arc-glow {
    fill: none;
    stroke: var(--arc-glow);
    stroke-width: 6;
    stroke-linecap: round;
    filter: blur(3px);
  }
  .arc {
    fill: none;
    stroke: var(--arc);
    stroke-width: 1.4;
    stroke-linecap: round;
  }

  .dest-dot {
    fill: var(--dest);
    stroke: var(--bg);
    stroke-width: 0.6;
  }
  .origin-dot {
    fill: var(--origin);
    stroke: var(--bg);
    stroke-width: 1.2;
  }
  .origin-pulse {
    fill: none;
    stroke: var(--pulse);
    stroke-width: 1.6;
  }

  .city-label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    fill: var(--ink);
    paint-order: stroke;
    stroke: var(--bg);
    stroke-width: 3px;
    stroke-linejoin: round;
    pointer-events: none;
    font-weight: 500;
  }
  .city-label.virtual {
    fill: var(--ink-soft);
    font-style: italic;
  }

  /* ===== Top banner (Globe / Timeline switch) ===== */
  .top-banner {
    position: fixed; top: 0; left: 0; right: 0; height: var(--banner-h); z-index: 60;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 22px;
    background: rgba(16, 80, 47, 0.97);
    border-bottom: 1px solid rgba(212, 223, 155, 0.2);
    backdrop-filter: blur(8px);
  }
  .top-banner .tb-nav { display: flex; gap: 4px; }
  .top-banner .tb-nav a {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; text-decoration: none;
    color: rgba(255,255,255,0.6); padding: 6px 15px; border-radius: 16px;
    transition: background 0.2s, color 0.2s;
  }
  .top-banner .tb-nav a:hover { color: #fff; }
  .top-banner .tb-nav a.active { background: rgba(255,255,255,0.16); color: #fff; }
  @media (max-width: 640px) {
    :root { --banner-h: 42px; }
    .top-banner { padding: 0 12px; }
    .top-banner .tb-nav a { font-size: 8.5px; padding: 5px 11px; letter-spacing: 1px; }
  }

  /* ---------- HUD ---------- */
  /* ===== Corner logo ===== */
  .hud-logo { position: absolute; top: 28px; left: 28px; z-index: 50; }
  .hud-logo img { height: 60px; width: auto; display: block; object-fit: contain; }
  .hud-logo .logo-light { display: block; }
  .hud-logo .logo-dark  { display: none; }
  body.dark .hud-logo .logo-light { display: none; }
  body.dark .hud-logo .logo-dark  { display: block; }
  @media (max-width: 640px) {
    .hud-logo { top: 14px; left: 14px; }
    .hud-logo img { height: 38px; }
  }

  .hud-title {
    position: absolute;
    top: 28px;
    left: 32px;
    pointer-events: none;
    z-index: 5;
    max-width: 320px;
  }
  .hud-title .sub {
    margin: 4px 0 0;
    font-size: 13px;
    font-weight: 400;
    color: #FFFFFF;
    opacity: 0.7;
    letter-spacing: 0;
  }
  .hud-title .range {
    margin: 2px 0 0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }

  /* Legend, under title block, no box. */
  .legend {
    position: absolute;
    top: 120px;
    left: 32px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 7px;
    pointer-events: none;
    width: max-content;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: max-content;
  }

  .hud-stats {
    position: absolute;
    top: 28px;
    right: 32px;
    display: flex;
    gap: 28px;
    align-items: flex-start;
    pointer-events: none;
    z-index: 5;
  }
  .stat { text-align: right; }
  .stat .label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }
  .stat .value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .year-overlay {
    position: absolute;
    bottom: 110px;
    left: 32px;
    pointer-events: none;
    z-index: 4;
    mix-blend-mode: var(--year-blend);
  }
  .year-overlay .milestone {
    font-family: var(--font-sans);
    font-size: 28px;
    font-weight: 400;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    line-height: 1.1;
    margin-bottom: 6px;
    opacity: 0;
    transition: opacity 0.8s ease;
    white-space: nowrap;
  }
  .year-overlay .year {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 500;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    line-height: 0.9;
  }
  .year-overlay .year-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  .legend-swatch {
    flex-shrink: 0;
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .legend-swatch.dot-origin { background: var(--origin); }
  .legend-swatch.dot-dest   { background: var(--dest); }
  .legend-swatch.diamond-virtual {
    background: var(--origin);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    filter: blur(2.5px);
    opacity: 0.7;
  }
  .legend-swatch.line-arc {
    height: 2px;
    border-radius: 2px;
    background: var(--arc);
    width: 12px;
  }
  .legend-swatch.org-ring {
    /* Branch = solid diamond (was a ring — read as a target). */
    background: var(--org-branch);
    border-radius: 2px;
    transform: rotate(45deg);
    width: 11px;
    height: 11px;
  }
  .legend-swatch.org-bead {
    border-radius: 50%;
    background: var(--org-local);
  }
  .legend-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink);
    white-space: nowrap;
  }

  /* Org-layer toggle, top-right under the stats. */
  .org-toggle {
    margin-top: 9px;
    align-self: flex-start;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--hud-bg);
    border: 1px solid var(--hud-border);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    transition: color 160ms ease, border-color 160ms ease;
  }
  .org-toggle .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink-faint);
    transition: background 160ms ease;
  }
  .org-toggle.active { color: var(--ink); border-color: var(--org-local); }
  .org-toggle.active .dot { background: var(--org-local); }

  /* ---------- Bottom controls ---------- */
  .controls {
    position: absolute;
    left: 32px;
    right: 32px;
    bottom: 18px;
    z-index: 5;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: center;
    background: transparent;
    border: none;
    padding: 0;
  }

  .play-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 160ms ease;
    padding: 0;
    flex-shrink: 0;
    opacity: 0.65;
  }
  .play-btn:hover { opacity: 1; }
  .play-btn svg { display: block; }

  .scrub-wrap {
    position: relative;
    height: 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .scrub-track {
    position: relative;
    height: 1px;
    background: var(--ink-faint);
    overflow: visible;
  }
  .scrub-fill { display: none; }
  .scrub-input {
    position: absolute;
    inset: -10px 0;
    width: 100%;
    height: 22px;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    cursor: pointer;
    z-index: 2;
  }
  .scrub-input::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: grab;
    box-shadow: none;
  }
  .scrub-input::-moz-range-thumb {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    cursor: grab;
  }
  .scrub-ticks {
    position: relative;
    height: 18px;
    margin-top: 10px;
  }
  .scrub-tick {
    position: absolute;
    transform: translateX(-50%);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    top: 0;
  }
  .scrub-tick::before {
    content: "";
    display: block;
    width: 1px;
    height: 6px;
    background: var(--ink-faint);
    margin: -12px auto 4px;
  }

  /* ---------- Mobile responsive ---------- */
  @media (max-width: 768px) {
    .hud-title {
      top: 16px;
      left: 16px;
      max-width: 180px;
    }
    .hud-title .sub { font-size: 11px; }
    .hud-title .range { font-size: 9px; }

    .legend {
      top: 72px;
      left: 16px;
      gap: 5px;
    }
    .legend-label { font-size: 8.5px; }
    .legend-swatch { width: 9px; height: 9px; }
    .legend-swatch.diamond-virtual { width: 11px; height: 11px; }
    .legend-swatch.line-arc { width: 9px; }

    .org-toggle {
      top: auto;
      bottom: 64px;
      right: 16px;
      font-size: 8.5px;
      padding: 4px 10px;
    }

    .hud-stats {
      top: 16px;
      right: 16px;
      gap: 16px;
    }
    .stat .label { font-size: 8px; letter-spacing: 0.12em; }
    .stat .value { font-size: 20px; }

    .year-overlay {
      bottom: 90px;
      left: 16px;
    }
    .year-overlay .year { font-size: 24px; }
    .year-overlay .year-sub { font-size: 9px; }
    .year-overlay .milestone { font-size: 16px; }

    .controls {
      left: 16px;
      right: 16px;
      bottom: 12px;
      gap: 12px;
    }
    .play-btn {
      width: 44px;
      height: 44px;
      opacity: 0.8;
    }
    .scrub-input {
      inset: -18px 0;
      height: 44px;
    }
    .scrub-input::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
    }
    .scrub-input::-moz-range-thumb {
      width: 18px;
      height: 18px;
    }
    .scrub-ticks { display: none; }

    .city-label { display: none; }
  }

  @media (max-width: 480px) {
    .legend { display: none; }
    .org-toggle { display: none; }
    .hud-stats { gap: 12px; }
    .stat .value { font-size: 18px; }
    .year-overlay .year { font-size: 20px; }
    .year-overlay .milestone { font-size: 14px; max-width: 200px; }
  }

  /* Landscape phones: short height, wide screen */
  @media (max-height: 500px) and (orientation: landscape) {
    .org-toggle { display: none; }
    .hud-title {
      top: 10px;
      left: 12px;
      max-width: 140px;
    }
    .hud-title .sub { font-size: 9px; }
    .hud-title .range { display: none; }

    .legend { display: none; }

    .hud-stats {
      top: 10px;
      right: 12px;
      gap: 12px;
    }
    .stat .label { font-size: 7px; letter-spacing: 0.1em; }
    .stat .value { font-size: 16px; }

    .year-overlay {
      bottom: 56px;
      left: 12px;
    }
    .year-overlay .year { font-size: 20px; }
    .year-overlay .year-sub { font-size: 8px; margin-top: 3px; }
    .year-overlay .milestone { font-size: 13px; max-width: 260px; }

    .controls {
      left: 12px;
      right: 12px;
      bottom: 8px;
      gap: 10px;
    }
    .play-btn {
      width: 36px;
      height: 36px;
      opacity: 0.8;
    }
    .scrub-input {
      inset: -16px 0;
      height: 36px;
    }
    .scrub-ticks { display: none; }
  }

</style>
</head>
<body class="light">
<header class="top-banner">
  <nav class="tb-nav">
    <a href="/globe">Globe</a>
    <a href="/timeline" class="active">Timeline</a>
    <a href="/growth">Growth</a>
  </nav>
</header>

<div id="app">
  <svg id="map" preserveAspectRatio="xMidYMid slice"></svg>

  <div class="hud-logo">
    <img class="logo-light" src="logo-black.png" alt="Climate Reality Project logo" />
    <img class="logo-dark"  src="logo.png"       alt="Climate Reality Project logo" />
  </div>

  <div class="legend">
    <div class="legend-row">
      <div class="legend-swatch dot-origin"></div>
      <div class="legend-label">Training city</div>
    </div>
    <div class="legend-row">
      <div class="legend-swatch diamond-virtual"></div>
      <div class="legend-label">Virtual training</div>
    </div>
    <div class="legend-row">
      <div class="legend-swatch dot-dest"></div>
      <div class="legend-label">Leader location</div>
    </div>
    <div class="legend-row">
      <div class="legend-swatch line-arc"></div>
      <div class="legend-label">Training &rarr; leaders' home</div>
    </div>
    <div class="legend-row">
      <div class="legend-swatch org-ring"></div>
      <div class="legend-label">Branch</div>
    </div>
    <div class="legend-row">
      <div class="legend-swatch org-bead"></div>
      <div class="legend-label">Chapter &middot; Hub</div>
    </div>
    <button class="org-toggle active" id="org-toggle" aria-label="Toggle the organization layer">
      <span class="dot"></span>Show network
    </button>
  </div>

  <div class="hud-stats">
    <div class="stat">
      <p class="label">Leaders trained</p>
      <p class="value" id="stat-leaders">0</p>
    </div>
    <div class="stat">
      <p class="label">Countries</p>
      <p class="value" id="stat-countries">0</p>
    </div>
  </div>

  <div class="year-overlay">
    <div class="milestone" id="milestone-text"></div>
    <div class="year" id="year-display">2006</div>
    <div class="year-sub" id="year-sub">June</div>
  </div>

  <div class="controls">
    <button class="play-btn" id="play-btn" aria-label="Play / pause">
      <svg id="play-icon" width="12" height="14" viewBox="0 0 14 16" fill="currentColor">
        <path d="M0 0 L14 8 L0 16 Z" />
      </svg>
    </button>

    <div class="scrub-wrap">
      <div class="scrub-track">
        <div class="scrub-fill" id="scrub-fill"></div>
        <input type="range" min="0" max="10000" step="1" value="0" class="scrub-input" id="scrub" />
      </div>
      <div class="scrub-ticks" id="scrub-ticks"></div>
    </div>

  </div>
</div>

<!-- D3 (used for the Natural Earth map projection math) -->
<script src="vendor/d3.min.js"></script>

<!-- Three.js -->
<script src="vendor/three.min.js"></script>

<!-- Map engine (WebGL) -->
<script src="map-gl.js"></script>

</body>
</html>
