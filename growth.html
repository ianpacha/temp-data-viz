<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Climate Reality — How the Movement Grew</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --banner-h: 48px;
    --navy: #123a5e;
    --ink: #1c3d5f;
    --font-sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Menlo", "Consolas", monospace;
    /* choropleth ramp — matches the reference legend buckets */
    --c0: #d8d8d8; --c1: #dbe89b; --c2: #a8d02f; --c3: #68b74b; --c4: #3a8b3b; --c5: #0f5a2c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #ffffff; color: var(--ink);
    font-family: var(--font-sans); overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* top banner */
  .top-banner { position: fixed; top: 0; left: 0; right: 0; height: var(--banner-h); z-index: 60;
    display: flex; align-items: center; justify-content: flex-end; padding: 0 22px;
    background: rgba(16, 80, 47, 0.97); border-bottom: 1px solid rgba(212,223,155,0.2); }
  .top-banner .tb-nav { display: flex; gap: 4px; }
  .top-banner .tb-nav a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; text-decoration: none; color: rgba(255,255,255,0.6);
    padding: 6px 15px; border-radius: 16px; transition: background .2s, color .2s; }
  .top-banner .tb-nav a:hover { color: #fff; }
  .top-banner .tb-nav a.active { background: rgba(255,255,255,0.16); color: #fff; }

  .hud-logo { position: absolute; top: calc(var(--banner-h) + 16px); left: 26px; z-index: 40; }
  .hud-logo img { height: 46px; width: auto; display: block; }

  #stage { position: fixed; inset: var(--banner-h) 0 0 0; overflow: hidden; }
  svg#map { width: 100%; height: 100%; display: block; }

  .country { stroke: #ffffff; stroke-width: 0.4; stroke-linejoin: round;
    transition: fill 500ms ease; }
  .arc { fill: none; stroke: #8DC63F; stroke-width: 1; stroke-linecap: round; }
  .origin-dot { fill: #C0D110; stroke: #ffffff; stroke-width: 1; }
  .origin-pulse { fill: none; stroke: #C0D110; }

  /* branch pins */
  .branch { opacity: 0; transition: opacity 700ms ease; }
  .branch.on { opacity: 1; }
  .branch .pin { fill: var(--navy); }
  .branch .pin-dot { fill: #ffffff; }
  .branch .lbl-bg { fill: var(--navy); }
  .branch .lbl-tx { fill: #ffffff; font-family: var(--font-sans); font-weight: 700;
    font-size: 12px; letter-spacing: .04em; dominant-baseline: middle; }

  /* legend */
  .legend { position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%); z-index: 30;
    display: flex; align-items: center; gap: 20px; font-size: 11px; color: var(--ink);
    background: rgba(255,255,255,0.82); padding: 10px 16px; border-radius: 6px; }
  .legend .title { font-weight: 600; max-width: 120px; line-height: 1.25; }
  .legend .buckets { display: grid; grid-template-columns: auto auto; gap: 4px 16px; }
  .legend .bk { display: flex; align-items: center; gap: 7px; }
  .legend .sw { width: 26px; height: 13px; display: inline-block; border: 0.5px solid rgba(0,0,0,0.15); }
  .legend .branch-key { display: flex; align-items: center; gap: 7px; font-weight: 600; }
  .legend .branch-key svg { display: block; }

  /* controls */
  .controls { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 30;
    display: flex; align-items: center; gap: 16px; width: min(760px, 88vw);
    background: rgba(255,255,255,0.9); padding: 10px 16px; border-radius: 24px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
  .controls button { border: 0; background: var(--navy); color: #fff; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 13px; display: flex; align-items: center;
    justify-content: center; flex: none; }
  .controls .year { font-family: var(--font-mono); font-size: 18px; font-weight: 600;
    color: var(--ink); width: 58px; text-align: center; flex: none; font-variant-numeric: tabular-nums; }
  .controls .track { position: relative; flex: 1; height: 6px; background: #e3e6df; border-radius: 3px; cursor: pointer; }
  .controls .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: var(--navy); border-radius: 3px; }
  .controls .count { font-family: var(--font-mono); font-size: 12px; color: var(--ink);
    width: 120px; text-align: right; flex: none; }
  .controls .count b { font-size: 14px; }

  /* hover tooltip */
  .tip { position: fixed; z-index: 80; pointer-events: none; background: var(--navy); color: #fff;
    font-size: 12px; padding: 6px 10px; border-radius: 5px; opacity: 0; white-space: nowrap;
    transform: translate(-50%, -140%); transition: opacity 120ms ease; font-family: var(--font-sans); }
  .tip b { font-family: var(--font-mono); font-weight: 600; }
  .country { cursor: default; }

  @media (max-width: 640px) {
    .legend { bottom: 92px; gap: 10px; padding: 8px 10px; font-size: 9px; }
    .legend .sw { width: 18px; height: 10px; }
    .controls { gap: 10px; padding: 8px 12px; }
    .controls .count { display: none; }
    .hud-logo img { height: 34px; }
    .branch .lbl-tx { font-size: 10px; }
  }
</style>
</head>
<body>

<header class="top-banner">
  <nav class="tb-nav">
    <a href="/globe">Globe</a>
    <a href="/timeline">Timeline</a>
    <a href="/growth" class="active">Growth</a>
  </nav>
</header>

<div class="hud-logo">
  <img src="logo-black.png" alt="Climate Reality Project" />
</div>

<div id="stage">
  <svg id="map"></svg>
</div>

<div class="tip" id="tip"></div>

<div class="legend">
  <div class="title">Climate Reality Leaders per Country</div>
  <div class="buckets">
    <div class="bk"><span class="sw" style="background:var(--c0)"></span>0</div>
    <div class="bk"><span class="sw" style="background:var(--c1)"></span>1&ndash;99</div>
    <div class="bk"><span class="sw" style="background:var(--c2)"></span>100&ndash;499</div>
    <div class="bk"><span class="sw" style="background:var(--c3)"></span>500&ndash;999</div>
    <div class="bk"><span class="sw" style="background:var(--c4)"></span>1,000&ndash;4,999</div>
    <div class="bk"><span class="sw" style="background:var(--c5)"></span>20,000+</div>
  </div>
  <div class="branch-key">
    <svg width="16" height="22" viewBox="0 0 16 22"><path d="M8 0C3.6 0 0 3.6 0 8c0 5.4 8 14 8 14s8-8.6 8-14c0-4.4-3.6-8-8-8z" fill="#123a5e"/><circle cx="8" cy="8" r="3" fill="#fff"/></svg>
    Branch Location
  </div>
</div>

<div class="controls">
  <button id="play" aria-label="Play/pause">❚❚</button>
  <div class="year" id="year">2006</div>
  <div class="track" id="track"><div class="fill" id="fill"></div></div>
  <div class="count" id="count"><b>0</b> leaders</div>
  <button id="replay" aria-label="Replay" title="Replay">↻</button>
</div>

<script src="vendor/d3.min.js"></script>
<script>
(function () {
  "use strict";
  const svg = d3.select("#map");
  const stage = document.getElementById("stage");
  let W = stage.clientWidth, H = stage.clientHeight;
  svg.attr("viewBox", `0 0 ${W} ${H}`);

  const gCountries = svg.append("g");
  const gArcs = svg.append("g");
  const gDots = svg.append("g");
  const gBranch = svg.append("g");

  // ---- color scale ----
  // RAMP drives the legend buckets. For the animation we interpolate CONTINUOUSLY
  // between those colors so each country starts light and darkens progressively as
  // leaders accumulate, while the bucket thresholds still anchor to the reference
  // colors (a country ending at 20,000+ lands on the darkest green, etc.).
  const RAMP = ["#d8d8d8","#dbe89b","#a8d02f","#68b74b","#3a8b3b","#0f5a2c"];
  const colorScale = d3.scaleLinear()
    .domain([0, 1, 100, 500, 1000, 20000])
    .range(["#e9e9e9", RAMP[1], RAMP[2], RAMP[3], RAMP[4], RAMP[5]])
    .interpolate(d3.interpolateHcl)
    .clamp(true);
  const fillFor = (n) => colorScale(n || 0);

  // ---- branch label formatting ----
  const brLabel = (name) => name.replace(/\s+Branch$/i, "").replace(/\s+and\s+/i, " & ").toUpperCase();

  let projection, path, features = [], events = [], branches = [];
  let countryTotals = new Map();      // country name -> cumulative leaders (live)
  const DURATION_MS = 26000;          // full 2006->end sweep
  let YEAR0, YEAR1, totalLeaders = 0, displayCount = 0;

  Promise.all([
    d3.json("data/countries-110m.geojson"),
    d3.json("data/events_v2.json"),
    d3.json("data/org.json").catch(() => ({ branches: [] })),
  ]).then(([geo, ev, org]) => {
    // Drop Antarctica (reference omits it) — no names in geojson, so use centroid latitude.
    features = geo.features.filter(f => d3.geoCentroid(f)[1] > -60);
    branches = (org.branches || []);

    // Fit projection to the visible land.
    projection = d3.geoNaturalEarth1();
    path = d3.geoPath(projection);
    fitProjection();

    // Draw countries (start grey).
    gCountries.selectAll("path").data(features).join("path")
      .attr("class", "country").attr("d", path).attr("fill", fillFor(0))
      .on("mousemove", onCountryHover).on("mouseleave", hideTip);

    // Match each destination country to the feature that contains its representative point.
    const rep = new Map();
    ev.forEach(e => e.arcs.forEach(a => { if (!rep.has(a.country)) rep.set(a.country, [a.lon, a.lat]); }));
    const featOfCountry = new Map();
    rep.forEach((pt, country) => {
      const f = features.find(ft => d3.geoContains(ft, pt));
      if (f) { featOfCountry.set(country, f); if (!f.__countries) f.__countries = []; f.__countries.push(country); }
    });

    // Timeline bounds.
    const times = ev.map(e => +new Date(e.date));
    YEAR0 = new Date(Math.min(...times)).getUTCFullYear();
    YEAR1 = new Date(Math.max(...times)).getUTCFullYear();
    const t0 = Math.min(...times), t1 = Math.max(...times);
    events = ev.map(e => ({
      city: e.city, lat: e.lat, lon: e.lon, leaders: e.leaders,
      t: (t1 === t0) ? 1 : (+new Date(e.date) - t0) / (t1 - t0),   // 0..1
      // dedup destinations to country level for the flying lines
      dests: dedupDests(e.arcs, featOfCountry),
      arcs: e.arcs,
    })).sort((a, b) => a.t - b.t);

    // Branch pins.
    buildBranches();

    setup();
    play();
  });

  function dedupDests(arcs, featOfCountry) {
    const m = new Map();
    arcs.forEach(a => {
      const cur = m.get(a.country);
      if (!cur || a.count > cur.count) m.set(a.country, { country: a.country, lon: a.lon, lat: a.lat, count: a.count });
    });
    // keep the biggest few so lines read as flow, not clutter
    return Array.from(m.values()).sort((x, y) => y.count - x.count).slice(0, 12);
  }

  function fitProjection() {
    const fc = { type: "FeatureCollection", features };
    projection.fitExtent([[12, 20], [W - 12, H - 96]], fc);
  }

  // ---------- Branch pins ----------
  function buildBranches() {
    gBranch.selectAll("*").remove();
    branches.forEach(b => {
      const [x, y] = projection([b.lon, b.lat]);
      const g = gBranch.append("g").attr("class", "branch")
        .attr("data-founded", b.founded || YEAR0)
        .attr("transform", `translate(${x},${y})`);
      // teardrop pin (tip at 0,0)
      g.append("path").attr("class", "pin")
        .attr("d", "M0 0 C-7 -9 -11 -13 -11 -19 A11 11 0 1 1 11 -19 C11 -13 7 -9 0 0 Z");
      g.append("circle").attr("class", "pin-dot").attr("cx", 0).attr("cy", -19).attr("r", 4);
      // label box — to the right normally, flipped left for right-edge pins so it stays on-screen
      const label = brLabel(b.name);
      const tw = label.length * 7.6 + 18;
      const flip = x > W * 0.72;
      const bx = flip ? -(tw + 10) : 10;
      g.append("rect").attr("class", "lbl-bg").attr("x", bx).attr("y", -27).attr("width", tw).attr("height", 18).attr("rx", 2);
      g.append("text").attr("class", "lbl-tx").attr("x", bx + 9).attr("y", -17.5).text(label);
    });
  }

  // ---------- Animation ----------
  let startTs = null, playing = false, elapsed = 0, evPtr = 0;
  const activeArcs = [], activeDots = [];

  function resetState() {
    countryTotals = new Map();
    totalLeaders = 0; displayCount = 0;
    evPtr = 0;
    gCountries.selectAll("path").attr("fill", fillFor(0));
    gArcs.selectAll("*").remove();
    gDots.selectAll("*").remove();
    activeArcs.length = 0; activeDots.length = 0;
    gBranch.selectAll(".branch").classed("on", false);
    document.getElementById("count").innerHTML = "<b>0</b> leaders";
  }

  function fireEvent(e) {
    // accumulate country totals, restep fills
    e.arcs.forEach(a => {
      const v = (countryTotals.get(a.country) || 0) + a.count;
      countryTotals.set(a.country, v);
    });
    totalLeaders += e.leaders;
    recolor(e);
    // origin dot
    if (e.lat != null && e.lon != null) {
      const [x, y] = projection([e.lon, e.lat]);
      if (x != null) spawnDot(x, y);
      // flying lines to destinations
      e.dests.forEach(d => {
        const [dx, dy] = projection([d.lon, d.lat]) || [];
        if (dx != null && Math.hypot(dx - x, dy - y) > 6) spawnArc(x, y, dx, dy);
      });
    }
  }

  function recolor(e) {
    const touched = new Set(e.arcs.map(a => a.country));
    gCountries.selectAll("path").each(function (f) {
      if (!f.__countries) return;
      if (!f.__countries.some(c => touched.has(c))) return;
      const tot = f.__countries.reduce((s, c) => s + (countryTotals.get(c) || 0), 0);
      d3.select(this).attr("fill", fillFor(tot));
    });
  }

  function spawnDot(x, y) {
    const dot = gDots.append("circle").attr("class", "origin-dot").attr("cx", x).attr("cy", y).attr("r", 3.2);
    const pulse = gDots.append("circle").attr("class", "origin-pulse").attr("cx", x).attr("cy", y).attr("r", 3);
    activeDots.push({ dot, pulse, born: elapsed });
  }
  function spawnArc(x1, y1, x2, y2) {
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const dx = x2 - x1, dy = y2 - y1, dist = Math.hypot(dx, dy);
    const cx = mx - dy / dist * dist * 0.22, cy = my + dx / dist * dist * 0.22;
    const d = `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`;
    const p = gArcs.append("path").attr("class", "arc").attr("d", d);
    const len = p.node().getTotalLength();
    p.attr("stroke-dasharray", len).attr("stroke-dashoffset", len);
    activeArcs.push({ p, len, born: elapsed });
  }

  const ARC_DRAW = 900, ARC_HOLD = 500, ARC_FADE = 900, DOT_LIFE = 2600;
  function updateTransients() {
    for (let i = activeArcs.length - 1; i >= 0; i--) {
      const a = activeArcs[i], age = elapsed - a.born, MAXO = 0.5;
      if (age < ARC_DRAW) a.p.attr("stroke-dashoffset", a.len * (1 - age / ARC_DRAW)).attr("opacity", MAXO);
      else if (age < ARC_DRAW + ARC_HOLD) a.p.attr("stroke-dashoffset", 0).attr("opacity", MAXO);
      else {
        const f = (age - ARC_DRAW - ARC_HOLD) / ARC_FADE;
        if (f >= 1) { a.p.remove(); activeArcs.splice(i, 1); }
        else a.p.attr("opacity", MAXO * (1 - f));
      }
    }
    for (let i = activeDots.length - 1; i >= 0; i--) {
      const d = activeDots[i], age = elapsed - d.born, f = age / DOT_LIFE;
      if (f >= 1) { d.dot.remove(); d.pulse.remove(); activeDots.splice(i, 1); }
      else {
        d.pulse.attr("r", 3 + f * 16).attr("opacity", (1 - f) * 0.7);
        d.dot.attr("opacity", 1 - f * 0.15);
      }
    }
  }

  function revealBranches(yearNow) {
    gBranch.selectAll(".branch").each(function () {
      const founded = +this.getAttribute("data-founded");
      if (yearNow >= founded) this.classList.add("on");
    });
  }

  // ---------- Loop ----------
  function frame(ts) {
    if (!playing) return;
    if (startTs == null) startTs = ts - elapsed;
    elapsed = ts - startTs;
    const p = Math.min(1, elapsed / DURATION_MS);
    while (evPtr < events.length && events[evPtr].t <= p) fireEvent(events[evPtr++]);
    updateTransients();
    const yearNow = Math.round(YEAR0 + p * (YEAR1 - YEAR0));
    revealBranches(yearNow);
    // rolling counter eases toward the live total
    displayCount += (totalLeaders - displayCount) * 0.16;
    if (Math.abs(totalLeaders - displayCount) < 1) displayCount = totalLeaders;
    document.getElementById("year").textContent = yearNow;
    document.getElementById("fill").style.width = (p * 100) + "%";
    document.getElementById("count").innerHTML = "<b>" + Math.round(displayCount).toLocaleString() + "</b> leaders";
    const ended = p >= 1 && activeArcs.length === 0 && activeDots.length === 0;
    if (ended) {
      displayCount = totalLeaders;
      document.getElementById("count").innerHTML = "<b>" + totalLeaders.toLocaleString() + "</b> leaders";
      playing = false; setPlayIcon();
    }
    requestAnimationFrame(frame);
  }

  function play() { if (playing) return; playing = true; startTs = null; setPlayIcon(); requestAnimationFrame(frame); }
  function pause() { playing = false; setPlayIcon(); }
  function setPlayIcon() { document.getElementById("play").textContent = playing ? "❚❚" : "▶"; }

  function seek(p) {
    pause();
    elapsed = p * DURATION_MS;
    resetState();
    // replay instantly up to p (fills only; skip transient spawns for a clean scrub)
    for (evPtr = 0; evPtr < events.length && events[evPtr].t <= p; evPtr++) {
      const e = events[evPtr];
      e.arcs.forEach(a => countryTotals.set(a.country, (countryTotals.get(a.country) || 0) + a.count));
      totalLeaders += e.leaders;
    }
    gCountries.selectAll("path").attr("fill", function (f) {
      if (!f.__countries) return fillFor(0);
      const tot = f.__countries.reduce((s, c) => s + (countryTotals.get(c) || 0), 0);
      return fillFor(tot);
    });
    const yearNow = Math.round(YEAR0 + p * (YEAR1 - YEAR0));
    revealBranches(yearNow);
    displayCount = totalLeaders;
    document.getElementById("year").textContent = yearNow;
    document.getElementById("fill").style.width = (p * 100) + "%";
    document.getElementById("count").innerHTML = "<b>" + totalLeaders.toLocaleString() + "</b> leaders";
  }

  // hover tooltip: country name + current leader count
  function onCountryHover(evt, f) {
    const tip = document.getElementById("tip");
    if (!f.__countries || !f.__countries.length) { tip.style.opacity = 0; return; }
    let name = f.__countries[0], best = -1, sum = 0;
    f.__countries.forEach(c => { const v = countryTotals.get(c) || 0; sum += v; if (v > best) { best = v; name = c; } });
    tip.innerHTML = name + " &middot; <b>" + sum.toLocaleString() + "</b> Leaders";
    tip.style.left = evt.clientX + "px";
    tip.style.top = evt.clientY + "px";
    tip.style.opacity = 1;
  }
  function hideTip() { document.getElementById("tip").style.opacity = 0; }

  function setup() {
    document.getElementById("play").onclick = () => playing ? pause() : (elapsed >= DURATION_MS ? (resetState(), play()) : play());
    document.getElementById("replay").onclick = () => { resetState(); elapsed = 0; play(); };
    const track = document.getElementById("track");
    const scrubTo = (clientX) => {
      const r = track.getBoundingClientRect();
      seek(Math.max(0, Math.min(1, (clientX - r.left) / r.width)));
    };
    let dragging = false;
    track.addEventListener("mousedown", e => { dragging = true; scrubTo(e.clientX); });
    window.addEventListener("mousemove", e => { if (dragging) scrubTo(e.clientX); });
    window.addEventListener("mouseup", () => dragging = false);
    track.addEventListener("touchstart", e => scrubTo(e.touches[0].clientX), { passive: true });
    track.addEventListener("touchmove", e => scrubTo(e.touches[0].clientX), { passive: true });
  }

  // ---------- Resize ----------
  let rt;
  window.addEventListener("resize", () => {
    clearTimeout(rt);
    rt = setTimeout(() => {
      W = stage.clientWidth; H = stage.clientHeight;
      svg.attr("viewBox", `0 0 ${W} ${H}`);
      fitProjection();
      gCountries.selectAll("path").attr("d", path);
      buildBranches();
      const p = Math.min(1, elapsed / DURATION_MS);
      seek(p);
    }, 150);
  });
})();
</script>
</body>
</html>
