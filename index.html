<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Climate Reality Leaders — Realistic Earth</title>
<style>
  :root {
    --p-bright:  #C0D110;
    --p-mid:     #8DC63F;
    --p-pale:    #D4DF9B;
    --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', Menlo, Consolas, monospace;
    --text: #E6E6E6;
    --text-muted: rgba(230, 230, 230, 0.7);
    --panel-bg: rgba(8, 16, 32, 0.72);
    --panel-border: rgba(140, 180, 230, 0.22);
    --dot-origin: #8DC63F;
    --dot-dest:   #D4DF9B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #03060c;
    color: var(--text);
    font-family: var(--font-sans);
    overflow: hidden;
    height: 100vh;
  }
  :root { --banner-h: 48px; }
  /* Map sits below the top banner so nothing is covered. */
  #earth-container { position: fixed; top: var(--banner-h); left: 0; right: 0; bottom: 0; }
  canvas { display: block; }

  /* ===== Top banner (Globe / Timeline switch) ===== */
  .top-banner {
    position: fixed; top: 0; left: 0; right: 0; height: var(--banner-h); z-index: 60;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 22px;
    background: rgba(16, 80, 47, 0.96);
    border-bottom: 1px solid rgba(212, 223, 155, 0.2);
    backdrop-filter: blur(8px);
  }
  .top-banner .tb-nav { display: flex; gap: 4px; }
  .top-banner .tb-nav a {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; text-decoration: none;
    color: rgba(255,255,255,0.6); padding: 6px 15px; border-radius: 16px;
    transition: background 0.2s, color 0.2s;
  }
  .top-banner .tb-nav a:hover { color: #fff; }
  .top-banner .tb-nav a.active { background: rgba(255,255,255,0.16); color: #fff; }

  /* ===== Corner logo ===== */
  .hud-logo { position: absolute; top: 28px; left: 28px; z-index: 50; }
  .hud-logo img { height: 60px; width: auto; display: block; object-fit: contain; }

  .hud-stats {
    position: absolute; top: 32px; right: 36px;
    text-align: right; font-family: var(--font-mono);
  }
  .hud-stats .stat-row { margin-bottom: 8px; }
  .hud-stats .stat-value {
    font-size: 24px; font-weight: 500; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .hud-stats .stat-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--text-muted);
  }

  .legend {
    position: absolute; top: 100px; left: 36px;
    font-size: 11px; font-family: var(--font-mono);
    color: var(--text-muted); line-height: 2.1;
  }
  .legend .swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 6px; vertical-align: middle;
  }
  .legend .swatch.org-ring {
    background: #FFC500; border-radius: 2px; transform: rotate(45deg);
    width: 9px; height: 9px;
  }
  .legend .swatch.org-bead { background: #FFC500; }
  .legend .legend-section {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted); margin-top: 12px; margin-bottom: 2px; opacity: 0.7;
  }

  /* ===== TOOLTIP ===== */
  .tooltip {
    display: none; position: absolute;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 4px; padding: 10px 14px;
    max-width: 240px; pointer-events: none;
    backdrop-filter: blur(8px); z-index: 100;
  }
  .tooltip.visible { display: block; }
  .tooltip .tt-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .tooltip .tt-stat  { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
  .tooltip .tt-stat strong { color: var(--p-bright); font-family: var(--font-mono); }

  /* ===== Toggles ===== */
  .dots-toggle, .org-toggle {
    position: absolute; left: 36px;
    display: flex; align-items: center; gap: 7px;
    background: none; border: 1px solid var(--text-muted);
    border-radius: 20px; padding: 5px 14px;
    color: var(--text-muted); font-size: 10px;
    font-family: var(--font-mono); letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    transition: color 0.3s, border-color 0.3s;
  }
  .dots-toggle:hover, .org-toggle:hover { color: var(--text); border-color: var(--text); }
  .dots-toggle .dot, .org-toggle .dot {
    width: 8px; height: 8px; border-radius: 50%;
    opacity: 0.35; transition: opacity 0.3s;
  }
  .dots-toggle .dot { background: #8DC63F; }
  .org-toggle  .dot { background: #FFC500; }
  .dots-toggle.active, .org-toggle.active { color: var(--text); border-color: var(--text); }
  .dots-toggle.active .dot, .org-toggle.active .dot { opacity: 1; }
  .dots-toggle { bottom: 64px; }
  .org-toggle  { bottom: 28px; }

  .instructions {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--text-muted);
    opacity: 0.55; font-family: var(--font-mono); letter-spacing: 0.5px;
  }

  /* ===== Phone layout ===== */
  @media (max-width: 640px) {
    :root { --banner-h: 42px; }
    .top-banner { padding: 0 12px; }
    .top-banner .tb-nav a { font-size: 8.5px; padding: 5px 11px; letter-spacing: 1px; }
    .hud-logo { top: 14px; left: 14px; }
    .hud-logo img { height: 38px; }
    .hud-stats { top: 14px; right: 14px; }
    .hud-stats .stat-value { font-size: 17px; }
    .hud-stats .stat-label { font-size: 8px; letter-spacing: 1px; }
    .legend { top: 64px; left: 14px; font-size: 9px; line-height: 1.85; }
    .legend .swatch { width: 8px; height: 8px; margin-right: 5px; }
    .dots-toggle, .org-toggle {
      left: 14px; font-size: 8.5px; padding: 4px 9px; letter-spacing: 0.5px; gap: 5px;
    }
    .org-toggle  { bottom: calc(env(safe-area-inset-bottom, 0px) + 60px); }
    .dots-toggle { bottom: calc(env(safe-area-inset-bottom, 0px) + 94px); }
    .dots-toggle .dot, .org-toggle .dot { width: 7px; height: 7px; }
    .instructions { display: none; }
    .tooltip { max-width: 200px; padding: 9px 12px; }
  }

  /* ===== Light theme overrides (body[data-style="light"]) ===== */
  body[data-style="light"] {
    --text: #10502F;
    --text-muted: rgba(16, 80, 47, 0.7);
    --panel-bg: rgba(244, 245, 236, 0.82);
    --panel-border: rgba(16, 80, 47, 0.2);
    --dot-origin: #C0D110;
    --dot-dest:   #457428;
  }

  /* Logo: white logo on the dark/earth/live backgrounds, black on light. */
  .hud-logo .logo-light { display: none; }
  .hud-logo .logo-dark  { display: block; }
  body[data-style="light"] .hud-logo .logo-light { display: block; }
  body[data-style="light"] .hud-logo .logo-dark  { display: none; }

  /* ===== Style picker (Light | Dark | Earth | Live) ===== */
  .style-picker {
    position: absolute; bottom: 28px; right: 36px;
    display: flex; gap: 2px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 20px; padding: 3px;
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .style-picker button {
    background: transparent; border: none;
    padding: 4px 11px; color: var(--text-muted);
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase;
    border-radius: 16px; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .style-picker button:hover { color: var(--text); }
  .style-picker button.active {
    background: rgba(140, 180, 230, 0.22);
    color: var(--text);
  }
  body[data-style="light"] .style-picker button.active { background: rgba(16, 80, 47, 0.12); }

  @media (max-width: 640px) {
    .style-picker {
      bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
      right: 14px; padding: 2px;
    }
    .style-picker button { font-size: 8px; padding: 3px 8px; }
  }
</style>
</head>
<body>

<header class="top-banner">
  <nav class="tb-nav">
    <a href="/globe" class="active">Globe</a>
    <a href="/timeline">Timeline</a>
    <a href="/growth">Growth</a>
  </nav>
</header>

<div id="earth-container">

  <div class="hud-logo">
    <img class="logo-light" src="logo-black.png" alt="Climate Reality Project logo" />
    <img class="logo-dark"  src="logo.png"       alt="Climate Reality Project logo" />
  </div>

  <div class="hud-stats">
    <div class="stat-row">
      <div class="stat-value" id="stat-leaders">55,141</div>
      <div class="stat-label">Leaders trained</div>
    </div>
    <div class="stat-row">
      <div class="stat-value" id="stat-countries">195</div>
      <div class="stat-label">Countries</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-section">Trainings</div>
    <span class="swatch" style="background:var(--dot-origin);"></span>Training city<br>
    <span class="swatch" style="background:var(--dot-origin); opacity:0.45;"></span>Virtual training<br>
    <span class="swatch" style="background:var(--dot-dest);"></span>Leader location<br>
    <div class="legend-section">Organization</div>
    <span class="swatch org-ring"></span>Branch<br>
    <span class="swatch org-bead"></span>Chapter &middot; Hub
  </div>

  <button class="dots-toggle active" id="dots-toggle"><span class="dot"></span>Trainings &amp; leaders</button>
  <button class="org-toggle active"  id="org-toggle"><span class="dot"></span>Branches, chapters &amp; hubs</button>

  <div class="style-picker" id="style-picker">
    <button data-style="light">Light</button>
    <button data-style="dark">Dark</button>
    <button data-style="earth" class="active">Earth</button>
    <button data-style="live">Live</button>
  </div>

  <div class="tooltip" id="tooltip">
    <div class="tt-title"></div>
    <div class="tt-stat"></div>
  </div>

  <div class="instructions">drag to rotate &middot; scroll / pinch to zoom &middot; click a marker for info</div>

</div>

<script src="vendor/three.min.js"></script>
<script src="org-markers.js"></script>
<script>
(function () {
  'use strict';

  // ─── Scene ─────────────────────────────────────────────────────────────────
  const container = document.getElementById('earth-container');
  let W = container.clientWidth, H = container.clientHeight;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03060c);

  const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
  camera.position.z = 2.6;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.insertBefore(renderer.domElement, container.firstChild);

  // ─── Lighting (front-lit so the visible hemisphere always reads) ──────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 1.05);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  // ─── Earth ─────────────────────────────────────────────────────────────────
  const RADIUS = 1;
  const earthGroup = new THREE.Group();
  scene.add(earthGroup);

  const texLoader = new THREE.TextureLoader();
  texLoader.crossOrigin = 'anonymous';
  const TEX = 'textures/';
  const earthMat = new THREE.MeshStandardMaterial({
    map:          texLoader.load(TEX + 'earth_atmos_2048.jpg'),
    normalMap:    texLoader.load(TEX + 'earth_normal_2048.jpg'),
    roughnessMap: texLoader.load(TEX + 'earth_specular_2048.jpg'),
    roughness:    0.85,
    metalness:    0.02,
  });
  const earth = new THREE.Mesh(new THREE.SphereGeometry(RADIUS, 96, 96), earthMat);
  earthGroup.add(earth);

  // ─── Stylized ocean + graticule + GeoJSON land lines (for Light/Dark) ────
  // Hidden until setStyle('light'|'dark'); the textured Earth covers the sphere
  // in Earth/Live modes so we hide these to avoid z-fighting.
  const oceanMat = new THREE.MeshBasicMaterial({ color: 0x10502F });
  const oceanMesh = new THREE.Mesh(new THREE.SphereGeometry(RADIUS, 80, 80), oceanMat);
  oceanMesh.visible = false;
  earthGroup.add(oceanMesh);

  const gratMat = new THREE.MeshBasicMaterial({
    color: 0xFFFFFF, wireframe: true, transparent: true, opacity: 0.05
  });
  const gratMesh = new THREE.Mesh(new THREE.SphereGeometry(RADIUS * 1.001, 36, 18), gratMat);
  gratMesh.visible = false;
  earthGroup.add(gratMesh);

  const landGroup = new THREE.Group();
  landGroup.visible = false;
  earthGroup.add(landGroup);

  // ─── Clouds (Live mode only) ──────────────────────────────────────────────
  const cloudsMat = new THREE.MeshLambertMaterial({
    map: texLoader.load(TEX + 'earth_clouds_1024.png'),
    transparent: true, opacity: 0.55, depthWrite: false
  });
  const cloudsMesh = new THREE.Mesh(new THREE.SphereGeometry(RADIUS * 1.006, 64, 64), cloudsMat);
  cloudsMesh.visible = false;
  earthGroup.add(cloudsMesh);

  // Lat/lon -> 3D point on the sphere. Matches the texture orientation.
  function latLonToVec3(lat, lon, r) {
    const phi   = (90 - lat) * Math.PI / 180;
    const theta = (lon + 180) * Math.PI / 180;
    return new THREE.Vector3(
      -r * Math.sin(phi) * Math.cos(theta),
       r * Math.cos(phi),
       r * Math.sin(phi) * Math.sin(theta)
    );
  }

  // Populate landGroup from the local GeoJSON outlines (Three.js draws them
  // directly — no TopoJSON decoder needed; the file is already plain [lon,lat]).
  fetch('data/countries-110m.geojson')
    .then(r => r.json())
    .then(countries => {
      countries.features.forEach(feature => {
        const coords = feature.geometry.type === 'Polygon'
          ? [feature.geometry.coordinates]
          : feature.geometry.coordinates;
        coords.forEach(polygon => {
          polygon.forEach(ring => {
            const points = ring.map(([lon, lat]) => latLonToVec3(lat, lon, RADIUS * 1.001));
            if (points.length < 3) return;
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0x56892F, transparent: true, opacity: 0.6 });
            landGroup.add(new THREE.Line(geo, mat));
          });
        });
      });
      applyStyleColors();   // recolor land lines to match the current style
    })
    .catch(() => {});

  // ─── Earth style picker (Light / Dark / Earth / Live) ──────────────────────
  // Each style swaps which meshes are visible + adjusts colours, lighting and
  // background. Live mode also aims the directional light at the real-world
  // subsolar point so the day/night terminator matches the actual time.
  const STYLES = {
    light: { bg: 0xF4F5EC, ocean: 0xF4F5EC, landStroke: 0xB5C47A, gratColor: 0x10502F, gratOpacity: 0.06, origin: 0xC0D110, dest: 0x457428, useTexture: false, clouds: false, ambient: 0.85, directional: 0.0 },
    dark:  { bg: 0x10502F, ocean: 0x10502F, landStroke: 0x56892F, gratColor: 0xFFFFFF, gratOpacity: 0.05, origin: 0x8DC63F, dest: 0xD4DF9B, useTexture: false, clouds: false, ambient: 0.85, directional: 0.0 },
    earth: { bg: 0x03060c,                                                                                origin: 0x8DC63F, dest: 0xD4DF9B, useTexture: true,  clouds: false, ambient: 0.60, directional: 1.00, sun: 'fixed' },
    live:  { bg: 0x000308,                                                                                origin: 0x8DC63F, dest: 0xD4DF9B, useTexture: true,  clouds: true,  ambient: 0.12, directional: 1.60, sun: 'realtime' },
  };
  let currentStyle = 'earth';
  const ambientLight = scene.children.find(c => c.isAmbientLight);

  // Subsolar point (lat, lon) from current UTC time -> unit vector. Drives the
  // sun direction in Live mode so the lit hemisphere matches "now."
  function sunDirection() {
    const now = new Date();
    const start = Date.UTC(now.getUTCFullYear(), 0, 0);
    const dayOfYear = Math.floor((now.getTime() - start) / 86400000);
    const declination = 23.44 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
    const utcHour = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
    const hourAngle = 15 * (utcHour - 12);   // degrees, +ve = west of prime meridian
    return latLonToVec3(declination, -hourAngle, 1);
  }

  function applyStyleColors() {
    const s = STYLES[currentStyle];
    if (s.ocean !== undefined) oceanMat.color.setHex(s.ocean);
    if (s.gratColor !== undefined) { gratMat.color.setHex(s.gratColor); gratMat.opacity = s.gratOpacity; }
    if (s.landStroke !== undefined) {
      landGroup.children.forEach(line => { if (line.material) line.material.color.setHex(s.landStroke); });
    }
    originDots.forEach(d => d.material.color.setHex(s.origin));
    destDots.forEach(d => d.material.color.setHex(s.dest));
  }

  function setStyle(style) {
    if (!STYLES[style]) return;
    currentStyle = style;
    const s = STYLES[style];

    scene.background = new THREE.Color(s.bg);
    document.body.dataset.style = style;

    // Mesh visibility per mode.
    earth.visible      = !!s.useTexture;
    oceanMesh.visible  = !s.useTexture;
    gratMesh.visible   = !s.useTexture;
    landGroup.visible  = !s.useTexture;
    cloudsMesh.visible = !!s.clouds;

    // Lighting per mode.
    if (ambientLight) ambientLight.intensity = s.ambient;
    sun.intensity = s.directional;
    if (s.sun === 'realtime') sun.position.copy(sunDirection()).multiplyScalar(5);
    else if (s.sun === 'fixed') sun.position.set(5, 3, 5);

    // Org glow blending: additive looks great over space/dark; normal on light.
    if (orgLayer) orgLayer.setGlowBlending(style !== 'light');

    applyStyleColors();

    // Update picker chip state.
    pickerButtons.forEach(b => b.classList.toggle('active', b.dataset.style === style));
  }

  // ─── Overlays (training dots + org markers) — real data ────────────────────
  const dotGroup = new THREE.Group();
  earthGroup.add(dotGroup);
  const originDots = [], destDots = [];
  let orgLayer = null, virtualDot = null;
  let orgShown = true, dotsShown = true;

  function placeDots(events) {
    const origins = new Map(), dests = new Map();
    events.forEach(ev => {
      if (!origins.has(ev.city)) {
        origins.set(ev.city, {
          lat: ev.lat, lon: ev.lon, cum: 0,
          isVirtual: /virtual/i.test(ev.city), date: ev.date,
          years: new Set()
        });
      }
      const o = origins.get(ev.city);
      o.cum += ev.leaders;
      if (ev.date) o.years.add(parseInt(ev.date.slice(0, 4), 10));
      ev.arcs.forEach(arc => {
        const dk = arc.label || arc.country;
        if (!dests.has(dk)) dests.set(dk, { lat: arc.lat, lon: arc.lon, cum: 0, country: arc.country });
        dests.get(dk).cum += arc.count;
      });
    });

    const SQ_LO = Math.sqrt(15), HI = 4502, SQ_HI = Math.sqrt(HI);
    function dotR(n) {
      if (n > HI) return 0.040;     // outsized generic Virtual
      const t = Math.max(0, Math.min(1, (Math.sqrt(n) - SQ_LO) / (SQ_HI - SQ_LO)));
      return Math.max(6, 3 + t * 32) * 0.001;
    }

    origins.forEach((o, city) => {
      const isVG = city.trim().toLowerCase() === 'virtual';
      const r = dotR(o.cum);
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(r, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0x8DC63F, transparent: true, opacity: o.isVirtual ? 0.55 : 0.95 })
      );
      if (isVG) {
        dot.position.set(RADIUS * 1.55, 0, 0); dot.visible = dotsShown; virtualDot = dot; scene.add(dot);
      } else {
        dot.position.copy(latLonToVec3(o.lat, o.lon, RADIUS * 1.012));
        dotGroup.add(dot);
      }
      dot.userData = {
        type: 'origin', city, leaders: o.cum, isVirtual: o.isVirtual,
        years: Array.from(o.years).sort((a, b) => a - b),
      };
      originDots.push(dot);
    });

    dests.forEach((d, key) => {
      const r = dotR(d.cum);
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(r, 10, 10),
        new THREE.MeshBasicMaterial({ color: 0xD4DF9B, transparent: true, opacity: 0.85 })
      );
      dot.position.copy(latLonToVec3(d.lat, d.lon, RADIUS * 1.008));
      dot.userData = { type: 'dest', label: key, country: d.country, leaders: d.cum };
      dotGroup.add(dot);
      destDots.push(dot);
    });
    applyStyleColors();   // apply current-style dot colours to the freshly-built dots
  }

  fetch('data/events_v2.json').then(r => r.json()).then(placeDots).catch(() => {});
  fetch('data/org.json').then(r => r.json()).then(org => {
    orgLayer = window.OrgMarkers.build({ parent: earthGroup, org, style: 'beacons', palette: 'gold' });
    orgLayer.setMotion(2);
    orgLayer.setLabelMode('off');
    orgLayer.setGlowBlending(currentStyle !== 'light');
    orgLayer.group.visible = orgShown;
  }).catch(() => {});

  // ─── Interaction: mouse + touch ────────────────────────────────────────────
  let isDragging = false;
  let prevPt = { x: 0, y: 0 };
  let rotVel = { x: 0, y: 0 };
  let autoRotate = true;
  let idleTimer = null;

  container.addEventListener('mousedown', (e) => {
    if (e.target.closest('button')) return;
    isDragging = true; autoRotate = false; clearTimeout(idleTimer);
    prevPt = { x: e.clientX, y: e.clientY };
  });
  container.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const dx = e.clientX - prevPt.x, dy = e.clientY - prevPt.y;
      rotVel.y = dx * 0.004; rotVel.x = dy * 0.004;
      earthGroup.rotation.y += rotVel.y;
      earthGroup.rotation.x = Math.max(-1.2, Math.min(1.2, earthGroup.rotation.x + rotVel.x));
      prevPt = { x: e.clientX, y: e.clientY };
    }
    handleHover(e);
  });
  container.addEventListener('mouseup',    () => { isDragging = false; idleTimer = setTimeout(() => autoRotate = true, 4000); });
  container.addEventListener('mouseleave', () => { isDragging = false; clearTimeout(idleTimer); autoRotate = true; hideTooltip(); });
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    camera.position.z = Math.max(1.4, Math.min(5, camera.position.z + e.deltaY * 0.002));
  }, { passive: false });

  // Touch: one finger rotate, pinch zoom, tap = info.
  let touchMode = null, pinchD0 = 0, pinchZ0 = 0, tapStart = null;
  const touchD = (e) => Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  container.addEventListener('touchstart', (e) => {
    if (e.target.closest('button')) return;
    if (e.touches.length === 1) {
      isDragging = true; autoRotate = false; clearTimeout(idleTimer);
      prevPt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      tapStart = { x: prevPt.x, y: prevPt.y, t: Date.now() };
      touchMode = 'rotate';
    } else if (e.touches.length === 2) {
      touchMode = 'pinch'; isDragging = false; tapStart = null;
      pinchD0 = touchD(e); pinchZ0 = camera.position.z;
    }
  }, { passive: true });
  container.addEventListener('touchmove', (e) => {
    if (touchMode === 'rotate' && e.touches.length === 1) {
      e.preventDefault();
      const t = e.touches[0];
      const dx = t.clientX - prevPt.x, dy = t.clientY - prevPt.y;
      earthGroup.rotation.y += dx * 0.005;
      earthGroup.rotation.x = Math.max(-1.2, Math.min(1.2, earthGroup.rotation.x + dy * 0.005));
      prevPt = { x: t.clientX, y: t.clientY };
      if (tapStart && (Math.abs(t.clientX - tapStart.x) > 10 || Math.abs(t.clientY - tapStart.y) > 10)) tapStart = null;
    } else if (touchMode === 'pinch' && e.touches.length === 2) {
      e.preventDefault();
      const d = touchD(e);
      if (d > 0) camera.position.z = Math.max(1.4, Math.min(5, pinchZ0 * (pinchD0 / d)));
    }
  }, { passive: false });
  container.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      isDragging = false;
      if (tapStart && Date.now() - tapStart.t < 300) handleHover({ clientX: tapStart.x, clientY: tapStart.y });
      tapStart = null; touchMode = null;
      idleTimer = setTimeout(() => autoRotate = true, 4000);
    } else if (e.touches.length === 1) {
      touchMode = 'rotate'; isDragging = true;
      prevPt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: false });

  // ─── Hover / tap tooltip ───────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltipEl = document.getElementById('tooltip');
  function pickables() {
    return [...originDots, ...destDots, ...(orgLayer ? orgLayer.markers : [])];
  }
  function handleHover(e) {
    if (isDragging) return;
    autoRotate = false; clearTimeout(idleTimer);
    idleTimer = setTimeout(() => autoRotate = true, 2500);
    // Use the canvas's on-screen rect so raycasting stays correct now that the
    // canvas sits below the top banner (clientX/Y are viewport-relative).
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(pickables());
    if (hits.length > 0) {
      // Some places carry both a virtual-training origin dot and a
      // leader-home destination dot at the exact same lat/lon (Colombia,
      // Brazil). Group hits sharing the same position so the underlying
      // dot's info isn't swallowed by the one closer to the camera.
      const first = hits[0];
      const group = [first];
      for (let i = 1; i < hits.length; i++) {
        if (hits[i].object.position.distanceToSquared(first.object.position) < 1e-4) {
          group.push(hits[i]);
        }
      }
      const tt = tooltipEl.querySelector('.tt-title');
      const ts = tooltipEl.querySelector('.tt-stat');

      function bodyFor(d) {
        if (d.type === 'origin') {
          let html = '<strong>' + d.leaders.toLocaleString() + '</strong> leaders trained here';
          if (d.years && d.years.length) {
            const yrTxt = d.years.length <= 3
              ? d.years.join(', ')
              : d.years[0] + '&ndash;' + d.years[d.years.length - 1] + ' &middot; ' + d.years.length + ' sessions';
            html += '<br/>Trained <strong>' + yrTxt + '</strong>';
          }
          return { title: d.city, body: html };
        }
        if (d.type === 'org') {
          return { title: d.name.replace(/\s+(Branch|Chapter|Hub)$/i, ''), body: d.label };
        }
        return { title: d.label, body: '<strong>' + d.leaders.toLocaleString() + '</strong> leaders from here' };
      }

      const seen = new Set();
      const sections = [];
      group.forEach(h => {
        const d = h.object.userData;
        const key = d.type + '|' + (d.city || d.label || d.name || '');
        if (seen.has(key)) return;
        seen.add(key);
        sections.push(bodyFor(d));
      });
      if (sections.length === 1) {
        tt.textContent = sections[0].title;
        ts.innerHTML = sections[0].body;
      } else {
        tt.textContent = '';
        ts.innerHTML = sections.map((s, i) =>
          '<div style="' + (i ? 'margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);' : '') +
          '"><div style="font-weight:600;color:var(--text);font-size:13px;">' + s.title + '</div>' + s.body + '</div>'
        ).join('');
      }

      tooltipEl.style.left = (e.clientX - rect.left + 14) + 'px';
      tooltipEl.style.top  = (e.clientY - rect.top - 10) + 'px';
      tooltipEl.classList.add('visible');
      container.style.cursor = 'pointer';
    } else {
      hideTooltip();
      container.style.cursor = 'grab';
    }
  }
  function hideTooltip() { tooltipEl.classList.remove('visible'); }

  // ─── Toggles ───────────────────────────────────────────────────────────────
  const dotsToggle = document.getElementById('dots-toggle');
  dotsToggle.addEventListener('click', () => {
    dotsShown = !dotsShown;
    dotsToggle.classList.toggle('active', dotsShown);
    dotGroup.visible = dotsShown;
    if (virtualDot) virtualDot.visible = dotsShown;
  });
  const orgToggle = document.getElementById('org-toggle');
  orgToggle.addEventListener('click', () => {
    orgShown = !orgShown;
    orgToggle.classList.toggle('active', orgShown);
    if (orgLayer) orgLayer.group.visible = orgShown;
  });

  // Earth-style picker (Light | Dark | Earth | Live)
  const pickerButtons = Array.from(document.querySelectorAll('#style-picker button'));
  pickerButtons.forEach(b => b.addEventListener('click', () => setStyle(b.dataset.style)));
  setStyle('earth');   // initial state — overrides the hard-coded background

  // ─── Render loop ───────────────────────────────────────────────────────────
  const clock = new THREE.Clock();
  let liveFrame = 0;
  function animate() {
    requestAnimationFrame(animate);
    if (autoRotate) earthGroup.rotation.y += 0.0015;
    if (currentStyle === 'live') {
      // Drift the clouds slightly faster than the earth for parallax.
      cloudsMesh.rotation.y += 0.0006;
      // Refresh real-time sun direction every ~60 frames (~1s); the sun
      // moves slowly so per-frame work would be wasted.
      if ((liveFrame++ & 63) === 0) sun.position.copy(sunDirection()).multiplyScalar(5);
    }
    if (orgLayer) orgLayer.update(clock.getElapsedTime(), camera);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    W = container.clientWidth; H = container.clientHeight;
    camera.aspect = W / H; camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });
})();
</script>
</body>
</html>
